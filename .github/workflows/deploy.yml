# GitHub Pages'e otomatik yayınlama (statik site — build adımı yok)
# Depoyu GitHub'a gönderdikten sonra: Repo → Settings → Pages →
#   "Build and deployment" → Source: "GitHub Actions" seçin.
# Ardından her "main" push'unda site otomatik yayınlanır.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek yayın; devam eden yayını iptal etme (yarım kalmasın)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tüm site kökü (.nojekyll sayesinde Jekyll işlemeden birebir yayınlanır)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
