<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EventPhoto API Docs</title>
  <style>
    body {
      margin: 0;
      background: #f6f0e6;
      color: #302b25;
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 16px 44px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
    }
    p {
      color: #6e6256;
      margin: 0 0 18px;
    }
    a {
      color: #735b37;
      font-weight: 600;
    }
    pre {
      overflow: auto;
      white-space: pre;
      padding: 16px;
      border: 1px solid #ded1bf;
      border-radius: 8px;
      background: #fffdf8;
      box-shadow: 0 18px 42px -30px rgba(55, 43, 30, .42);
    }
  </style>
</head>
<body>
  <main>
    <h1>EventPhoto API Docs</h1>
    <p>OpenAPI YAML dosyası aşağıda yerel olarak gösterilir. Ham dosya:
      <a href="./openapi.yaml">openapi.yaml</a>
    </p>
    <pre id="spec">Yükleniyor...</pre>
  </main>
  <script>
    fetch('./openapi.yaml', { cache: 'no-store' })
      .then(function (r) {
        if (!r.ok) throw new Error('openapi.yaml okunamadı');
        return r.text();
      })
      .then(function (text) {
        document.getElementById('spec').textContent = text;
      })
      .catch(function (err) {
        document.getElementById('spec').textContent = String(err && err.message || err);
      });
  </script>
</body>
</html>
